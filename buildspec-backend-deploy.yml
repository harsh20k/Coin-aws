# Deploy backend: SSM Run Command to pull new image and restart container (CodeBuild)
version: 0.2

phases:
  build:
    commands:
      - ECR_REGISTRY="${ECR_REPOSITORY_URI%/*}"
      - |
          SCRIPT='set -e
          echo "[$(date -Iseconds)] Starting deploy script"
          REGION="__REGION__"
          echo "[$(date -Iseconds)] Fetching SSM parameters..."
          DATABASE_URL=$(aws ssm get-parameter --name "__SSM_DATABASE_URL__" --with-decryption --region "$REGION" --query "Parameter.Value" --output text)
          COGNITO_REGION=$(aws ssm get-parameter --name "__SSM_COGNITO_REGION__" --with-decryption --region "$REGION" --query "Parameter.Value" --output text)
          COGNITO_USER_POOL_ID=$(aws ssm get-parameter --name "__SSM_COGNITO_USER_POOL_ID__" --with-decryption --region "$REGION" --query "Parameter.Value" --output text)
          COGNITO_APP_CLIENT_ID=$(aws ssm get-parameter --name "__SSM_COGNITO_APP_CLIENT_ID__" --with-decryption --region "$REGION" --query "Parameter.Value" --output text)
          echo "[$(date -Iseconds)] ECR login..."
          aws ecr get-login-password --region "$REGION" | sudo docker login --username AWS --password-stdin __ECR_REGISTRY__
          echo "[$(date -Iseconds)] Pulling image..."
          sudo docker pull __ECR_URI__
          echo "[$(date -Iseconds)] Creating/updating database tables..."
          sudo docker run --rm -e DATABASE_URL="$DATABASE_URL" __ECR_URI__ python -m scripts.create_tables
          echo "[$(date -Iseconds)] Stopping/removing existing container..."
          sudo docker stop backend 2>/dev/null || true
          sudo docker rm backend 2>/dev/null || true
          echo "[$(date -Iseconds)] Starting new container..."
          sudo docker run -d --name backend -p __PORT__:__PORT__ -e DATABASE_URL="$DATABASE_URL" -e COGNITO_REGION="$COGNITO_REGION" -e COGNITO_USER_POOL_ID="$COGNITO_USER_POOL_ID" -e COGNITO_APP_CLIENT_ID="$COGNITO_APP_CLIENT_ID" __ECR_URI__
          echo "[$(date -Iseconds)] Deploy script finished"'
      - |
          SCRIPT=$(echo "$SCRIPT" | sed "s|__REGION__|$AWS_REGION|g" | sed "s|__SSM_DATABASE_URL__|$SSM_DATABASE_URL|g" | sed "s|__SSM_COGNITO_REGION__|$SSM_COGNITO_REGION|g" | sed "s|__SSM_COGNITO_USER_POOL_ID__|$SSM_COGNITO_USER_POOL_ID|g" | sed "s|__SSM_COGNITO_APP_CLIENT_ID__|$SSM_COGNITO_APP_CLIENT_ID|g" | sed "s|__ECR_REGISTRY__|$ECR_REGISTRY|g" | sed "s|__ECR_URI__|$ECR_REPOSITORY_URI|g" | sed "s|__PORT__|$BACKEND_PORT|g")
      - echo "Sending SSM Run Command to instance $BACKEND_INSTANCE_ID..."
      - |
          echo "$SCRIPT" | python3 -c "import sys,json; open('script_param.json','w').write(json.dumps({'commands': [sys.stdin.read()]}))"
      - |
          CMD_ID=$(aws ssm send-command \
            --instance-ids "$BACKEND_INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters file://script_param.json \
            --region "$AWS_REGION" \
            --output text \
            --query "Command.CommandId")
          echo "Command ID: $CMD_ID"
      - echo "Waiting for command to complete..."
      - |
          # DEBUG: Test H1 - Check if get-command-invocation works at all
          echo "[DEBUG-H1] Testing get-command-invocation permission..."
          TEST_RESULT=$(aws ssm get-command-invocation --command-id $CMD_ID --instance-id $BACKEND_INSTANCE_ID --region $AWS_REGION 2>&1 || true)
          echo "[DEBUG-H1] Raw API response: $TEST_RESULT"
          
          for i in $(seq 1 90); do
            echo "[DEBUG-H4] Loop iteration: $i"
            
            # DEBUG: Test H2/H3 - Capture full error output
            STATUS_OUTPUT=$(aws ssm get-command-invocation --command-id $CMD_ID --instance-id $BACKEND_INSTANCE_ID --region $AWS_REGION --query "Status" --output text 2>&1)
            STATUS_EXIT_CODE=$?
            echo "[DEBUG-H2] get-command-invocation exit code: $STATUS_EXIT_CODE"
            echo "[DEBUG-H2] Raw status output: $STATUS_OUTPUT"
            
            # Parse status (fallback to Pending if command fails)
            if [ $STATUS_EXIT_CODE -eq 0 ]; then
              STATUS="$STATUS_OUTPUT"
            else
              echo "[DEBUG-H2] Command failed, defaulting to Pending"
              STATUS="Pending"
            fi
            
            echo "Status: $STATUS (iteration $i/90)"
            
            # DEBUG: Test H5 - Check SSM agent status
            if [ $((i % 6)) -eq 0 ]; then
              echo "[DEBUG-H5] Checking SSM instance info..."
              aws ssm describe-instance-information --instance-information-filter-list key=InstanceIds,valueSet=$BACKEND_INSTANCE_ID --region $AWS_REGION --output json || echo "[DEBUG-H5] Failed to get instance info"
            fi
            
            if [ "$STATUS" = "Success" ]; then
              echo "Command completed. Output from instance:"
              aws ssm get-command-invocation --command-id $CMD_ID --instance-id $BACKEND_INSTANCE_ID --region $AWS_REGION --query "StandardOutputContent" --output text
              aws ssm get-command-invocation --command-id $CMD_ID --instance-id $BACKEND_INSTANCE_ID --region $AWS_REGION --query "StandardErrorContent" --output text
              exit 0
            fi
            if [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ]; then
              aws ssm get-command-invocation --command-id $CMD_ID --instance-id $BACKEND_INSTANCE_ID --region $AWS_REGION
              exit 1
            fi
            sleep 10
          done
          echo "Timeout waiting for command"
          exit 1
artifacts:
  files: []

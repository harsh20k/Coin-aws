# Build backend Docker image and push to ECR (CodeBuild)
version: 0.2

phases:
  pre_build:
    commands:
      - echo "Logging in to ECR..."
      - aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin ${ECR_REPOSITORY_URI%/*}
  build:
    commands:
      - echo "Building backend image (linux/amd64)..."
      - docker build --platform linux/amd64 -t dalla-backend ./backend
      - docker tag dalla-backend:latest $ECR_REPOSITORY_URI:latest
      - echo "Pushing to ECR..."
      - docker push $ECR_REPOSITORY_URI:latest
artifacts:
  files: []
cache:
  paths: []
